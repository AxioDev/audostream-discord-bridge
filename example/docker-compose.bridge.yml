# Minimal docker-compose example for AudioStream Discord Bridge
version: "3"

services:
  audostream-discord-bridge:
    image: stieneee/audostream-discord-bridge:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DISCORD_TOKEN=your_bot_token
      - DISCORD_GID=your_guild_id
      - DISCORD_CID=your_voice_channel_id
      - HTTP_BIND=0.0.0.0:8080
